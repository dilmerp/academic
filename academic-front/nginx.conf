server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Activación de la compresión GZIP para optimizar el ancho de banda y la velocidad de carga
    gzip on;
    gzip_http_version 1.1;
    gzip_disable "MSIE [1-6]\.";
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Regla principal para Aplicaciones de una Sola Página (SPA)
    location / {
        # Si el archivo o directorio físico no existe en el contenedor, 
        # redirige la petición a index.html para que Angular maneje el enrutamiento.
        try_files $uri $uri/ /index.html;
    }

    # Configuración de políticas de caché para optimizar recursos estáticos en el navegador
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, library";
    }

    # Bloqueo de seguridad para evitar el acceso a archivos ocultos (como .git)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}