<div class="flex h-screen w-full bg-slate-50">

  <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-xl z-10">
    <div class="h-16 flex items-center justify-center border-b border-slate-700">
      <i class="pi pi-graduation-cap text-2xl mr-2 text-blue-400"></i>
      <span class="text-xl font-bold tracking-wider">System Academic</span>
    </div>

    <nav class="flex-1 overflow-y-auto py-4">
      <ul class="space-y-1 px-3">
        @for (item of menuItems; track item.label) {
          <li>
            @if (!item.children) {
              <a
                [routerLink]="item.route"
                routerLinkActive="bg-blue-600 text-white"
                [routerLinkActiveOptions]="{exact: false}"
                class="flex items-center px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white transition-colors duration-200">
                <i [class]="item.icon + ' text-lg w-6'"></i>
                <span class="ml-2 font-medium">{{ item.label }}</span>
              </a>
            } @else {
              <button
                (click)="toggleMenu(item)"
                class="w-full flex items-center justify-between px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white transition-colors duration-200 focus:outline-none">
                <div class="flex items-center">
                  <i [class]="item.icon + ' text-lg w-6'"></i>
                  <span class="ml-2 font-medium">{{ item.label }}</span>
                </div>
                <i class="pi text-sm transition-transform duration-200"
                   [class.pi-chevron-down]="item.expanded"
                   [class.pi-chevron-right]="!item.expanded"></i>
              </button>

              @if (item.expanded) {
                <ul class="mt-1 space-y-1 pl-4">
                  @for (child of item.children; track child.label) {
                    <li>
                      <a
                        [routerLink]="child.route"
                        routerLinkActive="bg-blue-600 text-white"
                        [routerLinkActiveOptions]="{exact: true}"
                        class="flex items-center px-4 py-2 rounded-lg text-sm text-slate-400 hover:bg-slate-800 hover:text-white transition-colors duration-200">
                        <i [class]="child.icon + ' mr-2 w-5 text-center'"></i>
                        <span>{{ child.label }}</span>
                      </a>
                    </li>
                  }
                </ul>
              }
            }
          </li>
        }
      </ul>
    </nav>
  </aside>

  <main class="flex-1 flex flex-col overflow-hidden">
    <header class="h-16 bg-white shadow-sm flex items-center justify-between px-6 z-0">
      <h2 class="text-slate-800 font-semibold">Sistema de Gestión Académica</h2>

      <div class="flex items-center gap-4">

        <div class="flex items-center gap-3">
          <span class="text-sm font-medium text-slate-600">Administrador</span>
          <div class="w-9 h-9 rounded-full bg-blue-100 flex items-center justify-center text-blue-600">
            <i class="pi pi-user"></i>
          </div>
        </div>

        <div class="h-6 w-px bg-slate-200"></div>

        <button
          (click)="logout()"
          class="flex items-center gap-2 text-slate-500 hover:text-red-600 transition-colors px-2 py-1 rounded hover:bg-red-50 group focus:outline-none"
          title="Cerrar Sesión">
          <i class="pi pi-sign-out text-lg group-hover:scale-110 transition-transform"></i>
          <span class="text-sm font-semibold hidden sm:block">Salir</span>
        </button>

      </div>
    </header>

    <div class="flex-1 overflow-y-auto p-6">
      <router-outlet></router-outlet>
    </div>
  </main>

</div>
